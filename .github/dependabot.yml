version: 2
updates:
  # npm dependencies (action runtime)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Major bumps on runtime deps need a manual smoke-test against gemini-3.5-flash
    # before merging — they break the bundle or the cost-guard accounting silently.
    # Patch and minor bumps continue to auto-open PRs as normal.
    ignore:
      - dependency-name: "@google/genai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@actions/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@actions/github"
        update-types: ["version-update:semver-major"]
      - dependency-name: "globby"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gray-matter"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by workflows in this repo
  - package-ecosystem: github-actions
    directory: "/.github/workflows"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
